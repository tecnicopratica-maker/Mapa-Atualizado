    const initialMapCenter = [-14.2350, -51.9253];
    const initialMapZoom = 4;
    const map = L.map('map').setView(initialMapCenter, initialMapZoom);
    let mapReady = false;
    map.whenReady(() => {
      mapReady = true;
      map.invalidateSize(false);
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'

    const markers = [];

    async function buscarDadosCepBrasilApi(cep) {
      try {
        const response = await fetch(`https://brasilapi.com.br/api/cep/v1/${cep}`);
        if (!response.ok) return null;

        const data = await response.json();
        if (data.message || data.errors) return null;

        return {
          logradouro: data.street || '',
          bairro: data.neighborhood || '',
          localidade: data.city || '',
          uf: data.state || '',
          cep: data.cep || cep
        };
      } catch (error) {
        return null;
      }
    }

    async function buscarDadosCepViaCep(cep) {
      try {
        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        if (!response.ok) return null;

        const data = await response.json();
        if (data.erro || !data.localidade) return null;

        return {
          logradouro: data.logradouro || '',
          bairro: data.bairro || '',
          localidade: data.localidade || '',
          uf: data.uf || '',
          cep: cep
        };
      } catch (error) {
        console.error('Erro ao buscar CEP no ViaCEP:', error);
        return null;
      }
    }

    async function buscarDadosCepNominatim(cep) {
      try {
        const termo = encodeURIComponent(`${cep}, Brasil`);
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${termo}`;
        const response = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        if (!response.ok) return null;

        const results = await response.json();
        if (!results || !results.length) return null;

        const address = results[0].address || {};
        const cidade = address.city || address.town || address.village || address.county || '';
        const uf = address.state || '';
        const logradouro = [address.road, address.pedestrian, address.cycleway, address.footway, address.house_number]
          .filter(Boolean)
          .join(' ');
        const bairro = address.neighbourhood || address.suburb || '';

        if (!cidade && !uf) return null;

        return {
          logradouro: logradouro || '',
          bairro: bairro,
          localidade: cidade,
          uf: uf,
          cep: cep
        };
      } catch (error) {
        return null;
      }
    }

    async function buscarDadosCep(cep) {
      const cepLimpo = limparCep(cep);
      if (cepLimpo.length !== 8) return null;

      return await buscarDadosCepViaCep(cepLimpo);
    }

    async function obterCoordenadasCep(cep, dadosCep = null) {
      const buscarNominatim = async (query) => {
        try {
          const termo = encodeURIComponent(query);
          const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${termo}`;
          const response = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
          if (!response.ok) return null;
          const results = await response.json();
          if (!results || !results.length) return null;

          const lat = parseFloat(results[0].lat);
          const lon = parseFloat(results[0].lon);
          if (Number.isNaN(lat) || Number.isNaN(lon)) return null;

          return [lat, lon];
        } catch (e) {
          console.error('Erro Nominatim:', e);
          return null;
        }
      };

      const cepLimpo = limparCep(cep);
      if (cepLimpo.length !== 8) return null;

      if (dadosCep && dadosCep.localidade && dadosCep.uf) {
        const query = `${dadosCep.localidade}, ${dadosCep.uf}, Brasil`;
        console.log('Buscando coordenadas:', query);
        const coords = await buscarNominatim(query);
        if (coords) return coords;
      }

      return null;
    }

      const cepLimpo = limparCep(cep);
      return cepLimpo.replace(/^(\d{5})(\d{3})$/, '$1-$2');

    function limparCep(valor) {
      return valor.replace(/\D/g, '');
    }

    function calcularDistancia(coord1, coord2) {
      const toRad = degrees => degrees * Math.PI / 180;
      const lat1 = toRad(coord1[0]);
      const lon1 = toRad(coord1[1]);
      const lat2 = toRad(coord2[0]);
      const lon2 = toRad(coord2[1]);
      const dLat = lat2 - lat1;
      const dLon = lon2 - lon1;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      const earthRadius = 6371;
      return earthRadius * c;
    }

    function encontrarTecnicoMaisProximo(coordenadas) {
      if (!coordenadas) return null;
      let melhor = null;
      let menorDist = Infinity;
      empresas.forEach(e => {
        const distancia = calcularDistancia(coordenadas, [e.lat, e.lng]);
        if (distancia < menorDist) {
          menorDist = distancia;
          melhor = e;
        }
      });
      return melhor;
    }

        resultado.classList.add('active');

    function ajustarZoomAoBuscar(coordenadas, tecnico) {
      if (!Array.isArray(coordenadas) || coordenadas.length !== 2) {
        console.error('Coordenadas inválidas para zoom:', coordenadas);
        return;
      }
      if (!tecnico || typeof tecnico.lat !== 'number' || typeof tecnico.lng !== 'number') {
        console.error('Técnico inválido para zoom:', tecnico);
        return;
      }

      const centro = L.latLng(coordenadas[0], coordenadas[1]);
      const tecnicoPoint = L.latLng(tecnico.lat, tecnico.lng);
      const bounds = L.latLngBounds([centro, tecnicoPoint]);
      const distanciaMetros = centro.distanceTo(tecnicoPoint);
      const zoomFallback = distanciaMetros < 25000 ? 12 : distanciaMetros < 100000 ? 10 : 8;

      if (!bounds.isValid()) {
        console.error('Bounds inválidos ao ajustar zoom:', bounds);
        map.setView(centro, zoomFallback);
        return;
      }

      const executeZoom = () => {
        try {
          if (mapReady) {
            map.invalidateSize(false);
          }
          map.fitBounds(bounds.pad(0.35), { padding: [60, 60], maxZoom: 12 });
          if (tecnico.marker) {
            tecnico.marker.openPopup();
          }
        } catch (error) {
          console.error('Falha no fitBounds, fallback para setView:', error);
          map.setView(centro, zoomFallback);
          if (tecnico.marker) {
            tecnico.marker.openPopup();
          }
        }
      };

      if (!mapReady) {
        map.whenReady(() => setTimeout(executeZoom, 50));
      } else {
        setTimeout(executeZoom, 50);
      }
    }

        criarDestaqueCep({ center: coordenadas, label: `CEP ${formatarCep(cepLimpo)}` }, tecnico);
        exibirResultadoCep({
          cep: formatarCep(cepLimpo),
          endereco,
          tecnico
        });

        ajustarZoomAoBuscar(coordenadas, tecnico);
      } catch (error) {
        console.error('Erro no handleCepSearch:', error);
        limparDestaqueCep();
        limparResultadoCep();
      } finally {
        esconderSpinner();
      }
    }
